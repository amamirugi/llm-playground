<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>LLM Playground</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#F0EEE6;
    --bg-grain:#EBE9DF;
    --surface:#FAF9F5;
    --surface-soft:#F5F3EC;
    --ink:#181712;
    --ink-soft:#6B6960;
    --ink-faint:#9A988D;
    --accent:#CC6A4A;
    --accent-hover:#B85738;
    --accent-soft:#F3E2D9;
    --border:#E3DFD2;
    --border-strong:#D6D1C0;
    --user:#1F1E18;
    --shadow:0 1px 2px rgba(40,36,24,.05),0 8px 24px rgba(40,36,24,.06);
    --shadow-lg:0 2px 4px rgba(40,36,24,.06),0 18px 50px rgba(40,36,24,.10);
    --radius:14px;
    --radius-sm:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Hanken Grotesk',-apple-system,sans-serif;
    background:var(--bg);
    color:var(--ink);
    font-size:15px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
    background-image:radial-gradient(circle at 18% 12%,rgba(204,106,74,.05),transparent 42%),radial-gradient(circle at 88% 88%,rgba(204,106,74,.04),transparent 40%);
  }
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:9px;border:2px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-thumb:hover{background:var(--ink-faint);background-clip:content-box}

  .app{display:flex;height:100dvh;width:100%}

  /* ── Sidebar ── */
  .sidebar{
    width:362px;flex-shrink:0;background:var(--surface);
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;
    transition:transform .3s cubic-bezier(.22,.61,.36,1);
    z-index:40;
  }
  .side-head{
    padding:22px 24px 18px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:11px;
  }
  .logo{width:30px;height:30px;flex-shrink:0;color:var(--accent)}
  .logo svg{width:100%;height:100%;display:block}
  .brand{font-family:'Fraunces',serif;font-size:20px;font-weight:500;letter-spacing:-.01em;line-height:1}
  .brand small{display:block;font-family:'Hanken Grotesk';font-size:11px;font-weight:500;color:var(--ink-faint);letter-spacing:.04em;text-transform:uppercase;margin-top:3px}

  .side-body{flex:1;overflow-y:auto;padding:8px 22px 26px}
  .group{margin-top:22px}
  .group-title{
    font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:var(--ink-faint);margin-bottom:12px;display:flex;align-items:center;gap:7px;
  }
  .group-title::after{content:"";flex:1;height:1px;background:var(--border)}

  label.field{display:block;margin-bottom:14px}
  .field > span{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:6px}
  input[type=text],input[type=password],input[type=number],select,textarea{
    width:100%;font-family:inherit;font-size:13.5px;color:var(--ink);
    background:var(--bg);border:1px solid var(--border-strong);
    border-radius:var(--radius-sm);padding:9px 11px;transition:border-color .15s,box-shadow .15s;
  }
  textarea{resize:vertical;min-height:64px;line-height:1.5}
  input:focus,select:focus,textarea:focus{
    outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);
  }
  input::placeholder,textarea::placeholder{color:var(--ink-faint)}
  .with-btn{display:flex;gap:7px}
  .with-btn input,.with-btn select{flex:1}

  .icon-btn{
    flex-shrink:0;width:38px;border:1px solid var(--border-strong);background:var(--bg);
    border-radius:var(--radius-sm);cursor:pointer;color:var(--ink-soft);
    display:flex;align-items:center;justify-content:center;transition:.15s;
  }
  .icon-btn:hover{background:var(--surface-soft);color:var(--ink);border-color:var(--ink-faint)}
  .icon-btn svg{width:16px;height:16px}

  /* slider field */
  .slider-field{margin-bottom:16px}
  .slider-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
  .slider-top .lbl{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--ink-soft)}
  .slider-val{font-family:'Spline Sans Mono',monospace;font-size:12px;background:var(--bg);border:1px solid var(--border);padding:2px 8px;border-radius:6px;color:var(--ink);min-width:46px;text-align:center}
  input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--border-strong);border-radius:4px;padding:0;border:none}
  input[type=range]:focus{box-shadow:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--surface);box-shadow:0 1px 3px rgba(0,0,0,.18);transition:transform .12s}
  input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.18)}
  input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--surface)}
  input[type=range]:disabled{opacity:.4}

  /* toggle */
  .tog{position:relative;width:34px;height:19px;flex-shrink:0;cursor:pointer}
  .tog input{opacity:0;width:0;height:0;position:absolute}
  .tog .track{position:absolute;inset:0;background:var(--border-strong);border-radius:19px;transition:.18s}
  .tog .track::after{content:"";position:absolute;left:2px;top:2px;width:15px;height:15px;background:#fff;border-radius:50%;transition:.18s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .tog input:checked + .track{background:var(--accent)}
  .tog input:checked + .track::after{transform:translateX(15px)}

  .btn{
    font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;border:none;
    border-radius:var(--radius-sm);padding:9px 14px;transition:.15s;display:inline-flex;
    align-items:center;justify-content:center;gap:7px;
  }
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent-hover)}
  .btn-ghost{background:var(--bg);color:var(--ink-soft);border:1px solid var(--border-strong)}
  .btn-ghost:hover{background:var(--surface-soft);color:var(--ink)}
  .btn-row{display:flex;gap:8px;margin-top:6px}
  .btn-row .btn{flex:1}

  .status{font-size:12px;margin-top:9px;padding:8px 11px;border-radius:8px;display:none;line-height:1.45}
  .status.show{display:block}
  .status.ok{background:#E8F0E4;color:#3F6B33;border:1px solid #CFE0C6}
  .status.err{background:#F6E2DC;color:#A0432C;border:1px solid #ECCABE}
  .status.info{background:var(--accent-soft);color:var(--accent-hover);border:1px solid #ECCFC2}

  .saved-hint{font-size:11px;color:var(--ink-faint);text-align:center;margin-top:18px;letter-spacing:.02em}

  /* ── Main ── */
  .main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
  .topbar{
    height:58px;flex-shrink:0;display:flex;align-items:center;gap:12px;padding:0 22px;
    border-bottom:1px solid var(--border);background:rgba(250,249,245,.72);backdrop-filter:blur(10px);
  }
  .topbar .menu-btn{display:none}
  .topbar .title{font-family:'Fraunces',serif;font-size:17px;font-weight:500}
  .topbar .model-chip{
    font-family:'Spline Sans Mono',monospace;font-size:11.5px;color:var(--ink-soft);
    background:var(--surface-soft);border:1px solid var(--border);padding:4px 10px;border-radius:20px;
    max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .topbar .spacer{flex:1}
  .topbar .clear-btn{
    border:1px solid var(--border-strong);background:var(--surface);color:var(--ink-soft);
    border-radius:8px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;
  }
  .topbar .clear-btn:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}
  .topbar .clear-btn svg{width:16px;height:16px}

  .chat{flex:1;overflow-y:auto;padding:28px 0}
  .chat-inner{max-width:760px;margin:0 auto;padding:0 24px;display:flex;flex-direction:column;gap:26px}

  /* empty state */
  .empty{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:40px 24px;color:var(--ink-soft);
  }
  .empty .star{width:52px;height:52px;color:var(--accent);margin-bottom:20px;animation:spin 22s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty h2{font-family:'Fraunces',serif;font-weight:500;font-size:27px;color:var(--ink);letter-spacing:-.01em;margin-bottom:9px}
  .empty p{font-size:14px;max-width:380px;line-height:1.6}
  .empty .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:24px;max-width:440px}
  .empty .chips button{
    font-family:inherit;font-size:13px;color:var(--ink-soft);background:var(--surface);
    border:1px solid var(--border);border-radius:20px;padding:8px 15px;cursor:pointer;transition:.15s;
  }
  .empty .chips button:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}

  /* messages */
  .msg{display:flex;gap:14px;animation:rise .35s cubic-bezier(.22,.61,.36,1)}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .avatar{
    width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;
  }
  .msg.user .avatar{background:var(--user);color:#F0EEE6}
  .msg.assistant .avatar{background:var(--accent-soft);color:var(--accent)}
  .msg.assistant .avatar svg{width:18px;height:18px}
  .bubble{flex:1;min-width:0;padding-top:3px}
  .msg .role{font-size:12px;font-weight:700;color:var(--ink-faint);margin-bottom:5px;letter-spacing:.02em}
  .content{font-size:15px;line-height:1.68;color:var(--ink);word-wrap:break-word;overflow-wrap:break-word}
  .content p{margin:0 0 12px}
  .content p:last-child{margin-bottom:0}
  .content h1,.content h2,.content h3{font-family:'Fraunces',serif;font-weight:600;margin:18px 0 10px;line-height:1.3}
  .content h1{font-size:22px}.content h2{font-size:19px}.content h3{font-size:16.5px}
  .content ul,.content ol{margin:0 0 12px;padding-left:22px}
  .content li{margin-bottom:5px}
  .content a{color:var(--accent-hover);text-decoration:underline;text-underline-offset:2px}
  .content strong{font-weight:700}
  .content code.inline{font-family:'Spline Sans Mono',monospace;font-size:.86em;background:var(--surface-soft);border:1px solid var(--border);padding:1px 5px;border-radius:5px}
  .content blockquote{border-left:3px solid var(--border-strong);padding-left:14px;color:var(--ink-soft);margin:0 0 12px}
  .content pre{position:relative;background:#211F1A;border-radius:12px;padding:15px 16px;margin:0 0 13px;overflow-x:auto}
  .content pre code{font-family:'Spline Sans Mono',monospace;font-size:13px;color:#E8E4D8;line-height:1.6;white-space:pre}
  .content pre .copy{position:absolute;top:9px;right:9px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#C9C5B8;font-size:11px;font-family:inherit;padding:3px 9px;border-radius:6px;cursor:pointer;transition:.15s;opacity:0}
  .content pre:hover .copy{opacity:1}
  .content pre .copy:hover{background:rgba(255,255,255,.16);color:#fff}
  .msg-actions{margin-top:8px;display:flex;gap:6px;opacity:0;transition:.15s}
  .msg:hover .msg-actions{opacity:1}
  .msg-actions button{background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:11.5px;font-family:inherit;display:flex;align-items:center;gap:4px;padding:2px 4px;border-radius:5px;transition:.15s}
  .msg-actions button:hover{color:var(--accent);background:var(--accent-soft)}
  .msg-actions svg{width:13px;height:13px}

  .typing{display:inline-flex;gap:4px;padding:4px 0}
  .typing span{width:7px;height:7px;border-radius:50%;background:var(--ink-faint);animation:blink 1.3s infinite both}
  .typing span:nth-child(2){animation-delay:.18s}
  .typing span:nth-child(3){animation-delay:.36s}
  @keyframes blink{0%,80%,100%{opacity:.25;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

  /* composer */
  .composer{flex-shrink:0;padding:14px 0 20px;background:linear-gradient(to top,var(--bg) 62%,transparent)}
  .composer-inner{max-width:760px;margin:0 auto;padding:0 24px}
  .input-wrap{
    background:var(--surface);border:1px solid var(--border-strong);border-radius:18px;
    padding:8px 8px 8px 16px;display:flex;align-items:flex-end;gap:10px;
    box-shadow:var(--shadow);transition:border-color .15s,box-shadow .15s;
  }
  .input-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft),var(--shadow)}
  .input-wrap textarea{
    flex:1;border:none;background:none;resize:none;font-size:15px;line-height:1.5;
    padding:8px 0;max-height:200px;color:var(--ink);
  }
  .input-wrap textarea:focus{outline:none;box-shadow:none;border:none}
  .send-btn{
    width:40px;height:40px;flex-shrink:0;border:none;border-radius:12px;background:var(--accent);
    color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;
  }
  .send-btn:hover{background:var(--accent-hover)}
  .send-btn:disabled{background:var(--border-strong);cursor:not-allowed}
  .send-btn svg{width:18px;height:18px}
  .send-btn.stop{background:var(--ink)}
  .composer-hint{text-align:center;font-size:11px;color:var(--ink-faint);margin-top:9px}

  .overlay{display:none;position:fixed;inset:0;background:rgba(30,28,22,.4);z-index:35}

  @media(max-width:880px){
    .sidebar{position:fixed;inset:0 auto 0 0;transform:translateX(-100%);box-shadow:var(--shadow-lg)}
    .sidebar.open{transform:none}
    .overlay.show{display:block}
    .topbar .menu-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border:1px solid var(--border-strong);background:var(--surface);border-radius:8px;cursor:pointer;color:var(--ink-soft)}
    .topbar .menu-btn svg{width:18px;height:18px}
    .topbar .model-chip{max-width:130px}
  }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="side-head">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.5l1.9 6.3L20 6l-4.2 4.9L22 12l-6.2 1.1L20 18l-6.1-1.8L12 22.5l-1.9-6.3L4 18l4.2-4.9L2 12l6.2-1.1L4 6l6.1 1.8z"/></svg>
      </div>
      <div class="brand">LLM Playground<small>Settings</small></div>
    </div>
    <div class="side-body">

      <div class="group">
        <div class="group-title">연결</div>
        <label class="field">
          <span>Base URL (Endpoint)</span>
          <input type="text" id="baseUrl" placeholder="https://api.openai.com/v1" spellcheck="false" />
        </label>
        <label class="field">
          <span>API Key</span>
          <div class="with-btn">
            <input type="password" id="apiKey" placeholder="sk-..." spellcheck="false" autocomplete="off" />
            <button class="icon-btn" id="toggleKey" title="표시/숨김">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </label>
        <label class="field">
          <span>Model</span>
          <div class="with-btn">
            <input type="text" id="model" placeholder="gpt-4o-mini" spellcheck="false" list="modelList" />
            <datalist id="modelList"></datalist>
            <button class="icon-btn" id="fetchModels" title="모델 목록 불러오기">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
            </button>
          </div>
        </label>
        <button class="btn btn-ghost" id="testBtn" style="width:100%;margin-top:2px">연결 테스트</button>
        <div class="status" id="connStatus"></div>
      </div>

      <div class="group">
        <div class="group-title">파라미터</div>
        <label class="field">
          <span>System Prompt</span>
          <textarea id="system" placeholder="당신은 도움이 되는 어시스턴트입니다."></textarea>
        </label>

        <div class="slider-field">
          <div class="slider-top">
            <div class="lbl"><label class="tog"><input type="checkbox" id="temp_on" checked><span class="track"></span></label> Temperature</div>
            <span class="slider-val" id="temp_v">1.00</span>
          </div>
          <input type="range" id="temp" min="0" max="2" step="0.01" value="1" />
        </div>

        <div class="slider-field">
          <div class="slider-top">
            <div class="lbl"><label class="tog"><input type="checkbox" id="maxtok_on" checked><span class="track"></span></label> Max Tokens</div>
            <span class="slider-val" id="maxtok_v">2048</span>
          </div>
          <input type="range" id="maxtok" min="16" max="32768" step="16" value="2048" />
        </div>

        <div class="slider-field">
          <div class="slider-top">
            <div class="lbl"><label class="tog"><input type="checkbox" id="topp_on"><span class="track"></span></label> Top P</div>
            <span class="slider-val" id="topp_v">1.00</span>
          </div>
          <input type="range" id="topp" min="0" max="1" step="0.01" value="1" disabled />
        </div>

        <div class="slider-field">
          <div class="slider-top">
            <div class="lbl"><label class="tog"><input type="checkbox" id="freq_on"><span class="track"></span></label> Frequency Penalty</div>
            <span class="slider-val" id="freq_v">0.00</span>
          </div>
          <input type="range" id="freq" min="-2" max="2" step="0.01" value="0" disabled />
        </div>

        <div class="slider-field">
          <div class="slider-top">
            <div class="lbl"><label class="tog"><input type="checkbox" id="pres_on"><span class="track"></span></label> Presence Penalty</div>
            <span class="slider-val" id="pres_v">0.00</span>
          </div>
          <input type="range" id="pres" min="-2" max="2" step="0.01" value="0" disabled />
        </div>

        <label class="field" style="display:flex;align-items:center;justify-content:space-between;margin-top:4px">
          <span style="margin-bottom:0">Streaming</span>
          <label class="tog"><input type="checkbox" id="stream" checked><span class="track"></span></label>
        </label>
      </div>

      <div class="saved-hint">설정은 이 브라우저에 자동 저장돼</div>
    </div>
  </aside>

  <div class="overlay" id="overlay"></div>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <div class="title">Chat</div>
      <div class="model-chip" id="modelChip">모델 미설정</div>
      <div class="spacer"></div>
      <button class="clear-btn" id="clearBtn" title="대화 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
      </button>
    </div>

    <div class="chat" id="chat">
      <div class="empty" id="empty">
        <div class="star">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.5l1.9 6.3L20 6l-4.2 4.9L22 12l-6.2 1.1L20 18l-6.1-1.8L12 22.5l-1.9-6.3L4 18l4.2-4.9L2 12l6.2-1.1L4 6l6.1 1.8z"/></svg>
        </div>
        <h2>무엇이든 물어봐</h2>
        <p>왼쪽 설정에서 Endpoint·Key·Model·파라미터를 맞춘 다음 대화를 시작해. OpenAI 호환 API라면 어디든 붙어.</p>
        <div class="chips" id="chips">
          <button>안녕, 자기소개 해줘</button>
          <button>이 플랫폼 사용법 알려줘</button>
          <button>파이썬으로 피보나치 함수 짜줘</button>
        </div>
      </div>
    </div>

    <div class="composer">
      <div class="composer-inner">
        <div class="input-wrap">
          <textarea id="input" rows="1" placeholder="메시지를 입력해…"></textarea>
          <button class="send-btn" id="sendBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
          </button>
        </div>
        <div class="composer-hint">Enter 전송 · Shift+Enter 줄바꿈</div>
      </div>
    </div>
  </main>
</div>

<script>
"use strict";

/* ---------- storage (graceful fallback) ---------- */
const KEY="llm_playground_v1";
let mem={};
const store={
  get(){try{const s=localStorage.getItem(KEY);return s?JSON.parse(s):(mem.d||null)}catch(e){return mem.d||null}},
  set(o){try{localStorage.setItem(KEY,JSON.stringify(o))}catch(e){mem.d=o}}
};

/* ---------- state ---------- */
const S={
  baseUrl:"",apiKey:"",model:"",system:"",
  temp:1,maxtok:2048,topp:1,freq:0,pres:0,
  temp_on:true,maxtok_on:true,topp_on:false,freq_on:false,pres_on:false,
  stream:true
};
let messages=[];       // {role, content}
let controller=null;   // AbortController
let busy=false;
// 아티팩트 미리보기(iframe)엔서는 fetch가 부모로 프록시되며 AbortSignal 복제가 안 됨 → signal 생략
const inIframe=(()=>{try{return window.self!==window.top}catch(e){return true}})();

const $=id=>document.getElementById(id);

/* ---------- load / persist ---------- */
function loadState(){
  const saved=store.get();
  if(saved) Object.assign(S,saved);
  // apply to UI
  $("baseUrl").value=S.baseUrl; $("apiKey").value=S.apiKey; $("model").value=S.model; $("system").value=S.system;
  ["temp","maxtok","topp","freq","pres"].forEach(k=>{$(k).value=S[k];});
  ["temp_on","maxtok_on","topp_on","freq_on","pres_on","stream"].forEach(k=>{$(k).checked=S[k];});
  syncSliders(); syncEnables(); updateChip();
}
function persist(){store.set(S);}

function syncSliders(){
  $("temp_v").textContent=Number(S.temp).toFixed(2);
  $("maxtok_v").textContent=S.maxtok;
  $("topp_v").textContent=Number(S.topp).toFixed(2);
  $("freq_v").textContent=Number(S.freq).toFixed(2);
  $("pres_v").textContent=Number(S.pres).toFixed(2);
}
function syncEnables(){
  $("temp").disabled=!S.temp_on;
  $("maxtok").disabled=!S.maxtok_on;
  $("topp").disabled=!S.topp_on;
  $("freq").disabled=!S.freq_on;
  $("pres").disabled=!S.pres_on;
}
function updateChip(){$("modelChip").textContent=S.model||"모델 미설정";}

/* ---------- bind inputs ---------- */
function bindText(id,key,after){
  $(id).addEventListener("input",e=>{S[key]=e.target.value;persist();if(after)after();});
}
bindText("baseUrl","baseUrl"); bindText("apiKey","apiKey");
bindText("model","model",updateChip); bindText("system","system");

[["temp","temp"],["maxtok","maxtok"],["topp","topp"],["freq","freq"],["pres","pres"]].forEach(([id,key])=>{
  $(id).addEventListener("input",e=>{S[key]=parseFloat(e.target.value);syncSliders();persist();});
});
[["temp_on","temp_on"],["maxtok_on","maxtok_on"],["topp_on","topp_on"],["freq_on","freq_on"],["pres_on","pres_on"],["stream","stream"]].forEach(([id,key])=>{
  $(id).addEventListener("change",e=>{S[key]=e.target.checked;syncEnables();persist();});
});

$("toggleKey").addEventListener("click",()=>{
  const f=$("apiKey"); f.type=f.type==="password"?"text":"password";
});

/* ---------- sidebar (mobile) ---------- */
const sidebar=$("sidebar"),overlay=$("overlay");
function openSide(){sidebar.classList.add("open");overlay.classList.add("show");}
function closeSide(){sidebar.classList.remove("open");overlay.classList.remove("show");}
$("menuBtn").addEventListener("click",openSide);
overlay.addEventListener("click",closeSide);

/* ---------- endpoint helpers ---------- */
function joinUrl(base,path){
  base=(base||"").trim().replace(/\/+$/,"");
  if(base.endsWith("/chat/completions")) return base; // user gave full path
  if(path==="/chat/completions" && base.endsWith("/chat")) return base+"/completions";
  return base+path;
}
function headers(){
  const h={"Content-Type":"application/json"};
  if(S.apiKey.trim()) h["Authorization"]="Bearer "+S.apiKey.trim();
  return h;
}
function status(el,type,msg){
  el.className="status show "+type; el.textContent=msg;
}

/* ---------- connection test ---------- */
$("testBtn").addEventListener("click",async()=>{
  const el=$("connStatus");
  if(!S.baseUrl.trim()){status(el,"err","Base URL을 먼저 입력해줘.");return;}
  status(el,"info","연결 확인 중…");
  try{
    const r=await fetch(joinUrl(S.baseUrl,"/models"),{headers:headers()});
    if(r.ok){
      const d=await r.json().catch(()=>null);
      const n=d&&Array.isArray(d.data)?d.data.length:null;
      status(el,"ok","연결 성공"+(n!=null?` · 모델 ${n}개 확인`:""));
    }else{
      status(el,"err",`응답 ${r.status} ${r.statusText}. Key·URL을 확인해줘.`);
    }
  }catch(e){
    status(el,"err","연결 실패: "+e.message+" (CORS·URL 확인)");
  }
});

/* ---------- fetch models ---------- */
$("fetchModels").addEventListener("click",async()=>{
  const el=$("connStatus");
  if(!S.baseUrl.trim()){status(el,"err","Base URL을 먼저 입력해줘.");return;}
  status(el,"info","모델 목록 불러오는 중…");
  try{
    const r=await fetch(joinUrl(S.baseUrl,"/models"),{headers:headers()});
    if(!r.ok){status(el,"err",`목록 실패 (${r.status})`);return;}
    const d=await r.json();
    const ids=(d.data||[]).map(m=>m.id).filter(Boolean).sort();
    const dl=$("modelList"); dl.innerHTML="";
    ids.forEach(id=>{const o=document.createElement("option");o.value=id;dl.appendChild(o);});
    status(el,"ok",`모델 ${ids.length}개 불러왔어. 입력칸을 누르면 목록이 떠.`);
  }catch(e){status(el,"err","불러오기 실패: "+e.message);}
});

/* ---------- markdown (mini, safe) ---------- */
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function mdInline(s){
  return s
    .replace(/`([^`]+)`/g,(_,c)=>`<code class="inline">${c}</code>`)
    .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
    .replace(/(^|[^*])\*([^*]+)\*/g,"$1<em>$2</em>")
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
}
function renderMd(src){
  const blocks=[]; // code fences
  src=src.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>{
    const i=blocks.length;
    blocks.push(`<pre><button class="copy">복사</button><code>${esc(code.replace(/\n$/,""))}</code></pre>`);
    return `\u0000${i}\u0000`;
  });
  src=esc(src);
  const lines=src.split("\n"); let html="",list=null;
  const closeList=()=>{if(list){html+=`</${list}>`;list=null;}};
  for(let line of lines){
    let m;
    if(/^\u0000\d+\u0000$/.test(line.trim())){closeList();html+=line;continue;}
    if((m=line.match(/^(#{1,3})\s+(.*)/))){closeList();const lv=m[1].length;html+=`<h${lv}>${mdInline(m[2])}</h${lv}>`;continue;}
    if((m=line.match(/^\s*[-*]\s+(.*)/))){if(list!=="ul"){closeList();html+="<ul>";list="ul";}html+=`<li>${mdInline(m[1])}</li>`;continue;}
    if((m=line.match(/^\s*\d+\.\s+(.*)/))){if(list!=="ol"){closeList();html+="<ol>";list="ol";}html+=`<li>${mdInline(m[1])}</li>`;continue;}
    if((m=line.match(/^\s*&gt;\s?(.*)/))){closeList();html+=`<blockquote>${mdInline(m[1])}</blockquote>`;continue;}
    if(line.trim()===""){closeList();continue;}
    closeList(); html+=`<p>${mdInline(line)}</p>`;
  }
  closeList();
  html=html.replace(/\u0000(\d+)\u0000/g,(_,i)=>blocks[i]);
  return html;
}

/* ---------- render chat ---------- */
const chat=$("chat");
function showEmpty(show){$("empty").style.display=show?"flex":"none";}
function scrollDown(){chat.scrollTop=chat.scrollHeight;}

function inner(){let el=chat.querySelector(".chat-inner");if(!el){el=document.createElement("div");el.className="chat-inner";chat.appendChild(el);}return el;}

function addMsg(role,content){
  showEmpty(false);
  const wrap=document.createElement("div");
  wrap.className="msg "+role;
  const isU=role==="user";
  wrap.innerHTML=`
    <div class="avatar">${isU?"나":'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.5l1.9 6.3L20 6l-4.2 4.9L22 12l-6.2 1.1L20 18l-6.1-1.8L12 22.5l-1.9-6.3L4 18l4.2-4.9L2 12l6.2-1.1L4 6l6.1 1.8z"/></svg>'}</div>
    <div class="bubble">
      <div class="role">${isU?"나":"Assistant"}</div>
      <div class="content"></div>
      <div class="msg-actions"><button class="copy-msg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>복사</button></div>
    </div>`;
  inner().appendChild(wrap);
  const c=wrap.querySelector(".content");
  if(isU) c.textContent=content; else c.innerHTML=renderMd(content||"");
  wrap.querySelector(".copy-msg").addEventListener("click",()=>navigator.clipboard&&navigator.clipboard.writeText(content));
  scrollDown();
  return c;
}
function bindCodeCopies(el){
  el.querySelectorAll("pre .copy").forEach(b=>{
    if(b.dataset.b)return; b.dataset.b="1";
    b.addEventListener("click",()=>{
      const code=b.parentElement.querySelector("code").innerText;
      if(navigator.clipboard)navigator.clipboard.writeText(code);
      b.textContent="복사됨"; setTimeout(()=>b.textContent="복사",1200);
    });
  });
}

/* ---------- send ---------- */
const input=$("input"),sendBtn=$("sendBtn");
input.addEventListener("input",()=>{input.style.height="auto";input.style.height=Math.min(input.scrollHeight,200)+"px";});
input.addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();onSend();}
});
sendBtn.addEventListener("click",()=>busy?stop():onSend());
$("chips").addEventListener("click",e=>{if(e.target.tagName==="BUTTON"){input.value=e.target.textContent;onSend();}});

$("clearBtn").addEventListener("click",()=>{
  if(busy)stop();
  messages=[]; const el=chat.querySelector(".chat-inner"); if(el)el.remove(); showEmpty(true);
});

function setBusy(b){
  busy=b;
  sendBtn.classList.toggle("stop",b);
  sendBtn.innerHTML=b
    ?'<svg viewBox="0 0 24 24" fill="currentColor"><rect x="7" y="7" width="10" height="10" rx="2"/></svg>'
    :'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>';
}
function stop(){if(controller)controller.abort();}

async function onSend(){
  if(busy)return;
  const text=input.value.trim();
  if(!text)return;
  if(!S.baseUrl.trim()){status($("connStatus"),"err","Base URL을 입력해줘.");openSide();return;}
  if(!S.model.trim()){status($("connStatus"),"err","Model을 입력해줘.");openSide();return;}

  input.value="";input.style.height="auto";
  messages.push({role:"user",content:text});
  addMsg("user",text);

  // assistant placeholder
  showEmpty(false);
  const c=addMsg("assistant","");
  c.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';

  setBusy(true);
  controller=new AbortController();

  // build payload
  const msgs=[];
  if(S.system.trim()) msgs.push({role:"system",content:S.system.trim()});
  msgs.push(...messages);
  const body={model:S.model.trim(),messages:msgs,stream:S.stream};
  if(S.temp_on) body.temperature=S.temp;
  if(S.maxtok_on) body.max_tokens=Math.round(S.maxtok);
  if(S.topp_on) body.top_p=S.topp;
  if(S.freq_on) body.frequency_penalty=S.freq;
  if(S.pres_on) body.presence_penalty=S.pres;

  let acc="";
  try{
    const opts={method:"POST",headers:headers(),body:JSON.stringify(body)};
    if(!inIframe) opts.signal=controller.signal; // 미리보기엔서 signal 생략(복제 불가)
    const r=await fetch(joinUrl(S.baseUrl,"/chat/completions"),opts);
    if(!r.ok){
      const t=await r.text().catch(()=>"");
      throw new Error(`HTTP ${r.status} ${r.statusText}\n${t.slice(0,400)}`);
    }

    if(S.stream && r.body){
      const reader=r.body.getReader(),dec=new TextDecoder();let buf="";
      while(true){
        const{done,value}=await reader.read();
        if(done)break;
        buf+=dec.decode(value,{stream:true});
        const parts=buf.split("\n");buf=parts.pop();
        for(let line of parts){
          line=line.trim();
          if(!line.startsWith("data:"))continue;
          const data=line.slice(5).trim();
          if(data==="[DONE]")continue;
          try{
            const j=JSON.parse(data);
            const d=j.choices&&j.choices[0]&&j.choices[0].delta;
            if(d&&d.content){acc+=d.content;c.innerHTML=renderMd(acc);bindCodeCopies(c);scrollDown();}
          }catch(_){}
        }
      }
    }else{
      const j=await r.json();
      acc=(j.choices&&j.choices[0]&&j.choices[0].message&&j.choices[0].message.content)||"(빈 응답)";
      c.innerHTML=renderMd(acc);bindCodeCopies(c);scrollDown();
    }

    if(!acc.trim())c.innerHTML='<p style="color:var(--ink-faint)">(빈 응답)</p>';
    messages.push({role:"assistant",content:acc});

  }catch(e){
    if(e.name==="AbortError"){
      c.innerHTML=acc?renderMd(acc)+'<p style="color:var(--ink-faint);font-size:13px">⏹ 중단됨</p>':'<p style="color:var(--ink-faint)">⏹ 중단됨</p>';
      if(acc.trim())messages.push({role:"assistant",content:acc});
    }else{
      let hint="";
      if(/failed to fetch/i.test(e.message))
        hint='<p style="color:var(--ink-soft);font-size:13px;margin-top:8px">대개 <strong>CORS 차단</strong>·잘못된 URL·https↔http 혼합 때문이야. 브라우저 직접 호출은 서버가 허용해야만 돼.</p>';
      c.innerHTML=`<p style="color:var(--accent-hover)"><strong>오류</strong></p><pre><code>${esc(e.message)}</code></pre>`+hint;
      bindCodeCopies(c);
      messages.pop(); // 실패한 user turn 제거 → 다음 전송 컨텍스트 정리
    }
  }finally{
    setBusy(false);controller=null;
  }
}

/* ---------- boot ---------- */
loadState();
input.focus();
</script>
</body>
</html>
